<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don García | La Casona 1930</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        html {
            scroll-behavior: smooth;
            font-size: 16px; 
        }
        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            background-color: #050505; /* Fondo negro base */
            color: #a8a29e; /* Color de texto base (stone-400) */
        }
        h1, h2, h3, .font-serif {
            font-family: 'Playfair Display', serif;
            letter-spacing: -0.02em;
            color: #fafaf9; /* Color de título base (stone-50) */
        }
        .bg-luxury-black { background-color: #050505; }
        .text-gold { color: #b08d48; }
        .border-gold { border-color: #b08d48; }
        .bg-gold { background-color: #b08d48; }
        
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease-out;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        input, select, textarea {
            font-size: 1rem !important;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #b08d48; border-radius: 4px; }
        
        .order-scrollbar::-webkit-scrollbar { width: 4px; }
        .order-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .order-scrollbar::-webkit-scrollbar-thumb { background: #b08d48; border-radius: 2px; }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fadeInUp {
            animation: fadeInUp 1s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .animate-scaleIn {
            animation: scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @media print {
            body {
                background-color: #ffffff !important;
                color: #000000 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .printable-area {
                display: block !important;
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                padding: 20px;
            }
            
            .printable-area * {
                color: #000000 !important;
                background-color: transparent !important;
            }
            
            .printable-area h2, .printable-area h3, .printable-area p {
                color: #000000 !important;
                border: none;
                padding: 0;
            }

            .printable-table {
                width: 100%;
                border-collapse: collapse;
                margin-bottom: 2rem;
            }
            
            .printable-table th, .printable-table td {
                border: 1px solid #dddddd;
                text-align: left;
                padding: 8px;
                font-size: 10pt;
            }
            
            .printable-table th {
                background-color: #f2f2f2 !important;
                font-weight: bold;
            }

            .no-print, .no-print * {
                display: none !important;
                visibility: hidden !important;
            }

            @page {
                size: A4 portrait;
                margin: 1.5cm;
            }
        }
    </style>
<script type="importmap">
{

    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
    "immer": "https://esm.sh/immer@^11.1.3",
    "firebase/": "https://esm.sh/firebase@^12.8.0/",
    "express": "https://esm.sh/express@^5.2.1",
    "cors": "https://esm.sh/cors@^2.8.6",
    "fs": "https://esm.sh/fs@^0.0.1-security",
    "path": "https://esm.sh/path@^0.12.7",

    "chart.js": "https://esm.sh/chart.js@^4.4.3",
    "chart.js/auto": "https://esm.sh/chart.js@^4.4.3/auto",
    "chart.js/": "https://esm.sh/chart.js@^4.5.1/"
  }
}
</script>

</head>
